# ─────────────────────────────────────────────────────────────────────
# CivicCompass — Cloud Build CI/CD Pipeline
# ─────────────────────────────────────────────────────────────────────
# Triggers on push to main branch.
# Builds & deploys both backend and frontend to Cloud Run.
#
# Required substitution variables (set in Cloud Build trigger):
#   _REGION           — e.g. asia-south1
#   _GEMINI_API_KEY   — Google Gemini API key
#   _BACKEND_URL      — will be set after first backend deploy
#   _FRONTEND_MAPS_KEY — Google Maps Frontend API Key
#   _BACKEND_MAPS_KEY  — Google Maps Backend Geocoding API Key
# ─────────────────────────────────────────────────────────────────────

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

substitutions:
  _REGION: asia-south1
  _BACKEND_SERVICE: civiccompass-api
  _FRONTEND_SERVICE: civiccompass-frontend

steps:
  # ── Step 1: Build Backend Image ──────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/civiccompass/${_BACKEND_SERVICE}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/civiccompass/${_BACKEND_SERVICE}:latest'
      - './backend'

  # ── Step 2: Build Frontend Image ─────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_BACKEND_URL=${_BACKEND_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${_FRONTEND_MAPS_KEY}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/civiccompass/${_FRONTEND_SERVICE}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/civiccompass/${_FRONTEND_SERVICE}:latest'
      - './frontend'

  # ── Step 3: Push Backend Image ───────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/civiccompass/${_BACKEND_SERVICE}'

  # ── Step 4: Push Frontend Image ──────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    waitFor: ['build-frontend']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/civiccompass/${_FRONTEND_SERVICE}'

  # ── Step 5: Deploy Backend to Cloud Run ──────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-backend'
    waitFor: ['push-backend']
    args:
      - 'run'
      - 'deploy'
      - '${_BACKEND_SERVICE}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/civiccompass/${_BACKEND_SERVICE}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--concurrency'
      - '80'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production,GCP_PROJECT_ID=$PROJECT_ID,GEMINI_API_KEY=${_GEMINI_API_KEY},GOOGLE_MAPS_API_KEY=${_BACKEND_MAPS_KEY},USE_LOCAL_DATA=true,FRONTEND_URL=https://${_FRONTEND_SERVICE}-$PROJECT_NUMBER.${_REGION}.run.app'

  # ── Step 6: Deploy Frontend to Cloud Run ─────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']
    args:
      - 'run'
      - 'deploy'
      - '${_FRONTEND_SERVICE}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/civiccompass/${_FRONTEND_SERVICE}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--concurrency'
      - '80'
      - '--allow-unauthenticated'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/civiccompass/${_BACKEND_SERVICE}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/civiccompass/${_FRONTEND_SERVICE}:$COMMIT_SHA'

timeout: '1200s'
